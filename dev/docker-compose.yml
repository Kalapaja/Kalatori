version: '3.8'

services:
  chopsticks-asset-hub:
    build:
      context: ./chopsticks
      dockerfile: Dockerfile
    container_name: chopsticks-asset-hub
    ports:
      - "9000:9000"
    volumes:
      - ./chopsticks/pd-ah.yml:/app/config.yml
    command: ["chopsticks", "-c", "/app/config.yml", "--port", "9000", "--host", "0.0.0.0"]

  chopsticks-asset-hub-2:
    build:
      context: ./chopsticks
      dockerfile: Dockerfile
    container_name: chopsticks-asset-hub-2
    ports:
      - "9500:9500"
    volumes:
      - ./chopsticks/pd-ah-2.yml:/app/config.yml
    command: [ "chopsticks", "-c", "/app/config.yml", "--port", "9500", "--host", "0.0.0.0" ]

  anvil:
    image: ghcr.io/foundry-rs/foundry:stable
    environment:
      - ANVIL_IP_ADDR=0.0.0.0
    ports:
      - "8545:8545"
    command: -c "anvil --fork-url https://polygon.drpc.org"

  # It seems alto doesn't fully support Entrypoint v0.8 ABI,
  # so transaction result cannot be properly decoded and the
  # simulation fails. To avoid that bug we use flags `--safe-mode false`
  # and `--dangerous-skip-user-operation-validation` only for tests.
  alto:
    image: ghcr.io/pimlicolabs/alto:latest
    depends_on:
      - anvil
    command:
      [
        "--entrypoints", "0x4337084D9E255Ff0702461CF8895CE9E3b5Ff108",
        "--executor-private-keys", "0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80",
        "--utility-private-key", "0x2a871d0798f97d79848a013d4936a73bf4cc922c825d33c1cf7073dff6d409c6",
        "--rpc-url", "http://anvil:8545",
        "--port", "4337",
        "--safe-mode", "false",
        "--dangerous-skip-user-operation-validation",
      ]
    ports:
      - "4337:4337"
