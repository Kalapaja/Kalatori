name: Setup Rust Build Environment
description: Install project-local Rust tooling, download chain metadata, and download the front-end

runs:
  using: composite
  steps:
    # Cache project-local tool binaries (subxt-cli, nextest, llvm-cov, ...).
    - name: Cache project-local tool binaries
      id: cache-bin
      uses: actions/cache@v5
      with:
        path: .bin/
        key: bins-${{ hashFiles('Cargo.toml') }}

    - name: Install Rust tools (subxt-cli, nextest, llvm-cov)
      if: steps.cache-bin.outputs.cache-hit != 'true'
      shell: bash
      run: make setup-utils

    - name: Download chain metadata
      shell: bash
      run: make download-node-metadata

    # Cache the unpacked front-end. Keyed on front-end.mk only, so tool bumps
    # do not bust this cache.
    - name: Cache front-end
      id: cache-front-end
      uses: actions/cache@v5
      with:
        path: static/
        key: front-end-${{ hashFiles('front-end.mk') }}

    - name: Download front-end
      if: steps.cache-front-end.outputs.cache-hit != 'true'
      shell: bash
      run: make download-front-end
