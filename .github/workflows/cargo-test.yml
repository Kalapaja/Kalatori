name: Rust test

on:
  pull_request:
  push:
    branches:
      - main
      - stable

jobs:
  check:
    name: Cargo test
    runs-on: ubuntu-latest
    steps:
      - name: Cancel Previous Runs
        uses: styfle/cancel-workflow-action@0.13.0
        with:
          access_token: ${{ github.token }}
      - name: Checkout sources
        uses: actions/checkout@v5
      - name: Build and install SQLite 3.51.0 from source
        run: |
          cd /tmp
          curl -LO https://www.sqlite.org/2025/sqlite-autoconf-3510000.tar.gz
          tar xzf sqlite-autoconf-3510000.tar.gz
          cd sqlite-autoconf-3510000
          CFLAGS="-DSQLITE_ENABLE_UNLOCK_NOTIFY=1 -DSQLITE_ENABLE_COLUMN_METADATA=1 -DSQLITE_ENABLE_DBSTAT_VTAB=1 -DSQLITE_ENABLE_FTS3=1 -DSQLITE_ENABLE_FTS3_PARENTHESIS=1 -DSQLITE_ENABLE_FTS5=1 -DSQLITE_ENABLE_JSON1=1 -DSQLITE_ENABLE_RTREE=1 -DSQLITE_ENABLE_STAT4=1" \
            ./configure --prefix=/usr/local --enable-shared --enable-static
          make -j$(nproc)
          sudo make install
          sudo ldconfig
          rm -rf /tmp/sqlite-autoconf*
      - name: Create pkg-config file for SQLite
        run: |
          sudo mkdir -p /usr/local/lib/pkgconfig
          sudo tee /usr/local/lib/pkgconfig/sqlite3.pc > /dev/null << 'EOF'
          prefix=/usr/local
          exec_prefix=${prefix}
          libdir=${exec_prefix}/lib
          includedir=${prefix}/include

          Name: SQLite
          Description: SQL database engine
          Version: 3.51.0
          Libs: -L${libdir} -lsqlite3
          Libs.private: -lm -ldl -lpthread
          Cflags: -I${includedir}
          EOF
      - name: Verify SQLite installation
        run: |
          sqlite3 --version
          pkg-config --modversion sqlite3
          pkg-config --libs sqlite3
      - name: Install cargo-nextest
        uses: baptiste0928/cargo-install@v3
        with:
          crate: cargo-nextest
          version: 0.9
      - name: Rust Cache
        uses: Swatinem/rust-cache@v2.7.5
      - name: Install subxt-cli
        run: make install-subxt-cli
      - name: Download chain metadata
        run: make download-node-metadata-ci
      - name: Download front-end (required for daemon compilation)
        run: make download-front-end
      - name: cargo nextest
        run: cargo nextest run
        env:
          PKG_CONFIG_PATH: /usr/local/lib/pkgconfig
          LD_LIBRARY_PATH: /usr/local/lib
          SQLITE3_LIB_DIR: /usr/local/lib
          SQLITE3_INCLUDE_DIR: /usr/local/include
