name: Integration test

on:
  workflow_call:

jobs:
  integration-test:
    name: Run integration tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      # Restore cargo registry / target cache before any compilation step so the
      # first build (subxt-cli install in the composite) benefits from a warm
      # registry.
      - name: Rust cache
        uses: Swatinem/rust-cache@v2.8.2

      - name: Setup SQLite
        uses: ./.github/actions/setup-sqlite

      - name: Setup Rust build environment
        uses: ./.github/actions/setup-rust-build-env

      - name: Create configs
        run: make copy-configs

      - name: Create database directory
        run: mkdir database

      - name: Run daemon and chopsticks in background
        run: make run &

      # Poll the public /info endpoint until the daemon answers, capped at 5
      # minutes so a stuck daemon still fails the job in bounded time. Replaces
      # an unconditional `sleep 300`.
      - name: Wait for daemon to be ready
        run: |
          timeout 300 bash -c 'until curl -sf http://localhost:8080/public/info >/dev/null; do sleep 2; done'

      - name: Run integration tests
        run: make run-test-examples
