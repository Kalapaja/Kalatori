name: Cargo test with coverage

on:
  workflow_call:
    secrets:
      CODECOV_TOKEN:
        required: true

jobs:
  test-coverage:
    name: Run unit tests with coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Restore cargo registry / target cache before any compilation step so the
      # first build benefits from a warm registry.
      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Setup SQLite
        uses: ./.github/actions/setup-sqlite

      - name: Setup Rust build environment
        uses: ./.github/actions/setup-rust-build-env

      - name: Run tests with coverage
        # NOTE: insta snapshot tests require CI=true to fail on mismatches instead of writing .snap.new files.
        # GitHub Actions sets CI=true by default, but this must be set explicitly when migrating to Dagger.
        run: make generate-coverage-report

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
