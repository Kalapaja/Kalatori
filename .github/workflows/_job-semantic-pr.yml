name: Semantic PR

on:
  workflow_call:

jobs:
  semantic-pr:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            major
            feat
            fix
            chore
            docs
            style
            refactor
            test
            build
            ci
            revert
          validateSingleCommit: true
          wip: false
