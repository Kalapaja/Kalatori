name: Cargo test

on:
  workflow_call:

jobs:
  test:
    name: Run unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Restore cargo registry / target cache before any compilation step so the
      # first build benefits from a warm registry.
      - name: Rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Setup SQLite
        uses: ./.github/actions/setup-sqlite

      - name: Setup Rust build environment
        uses: ./.github/actions/setup-rust-build-env

      - name: Run tests
        # NOTE: insta snapshot tests require CI=true to fail on mismatches instead of writing .snap.new files.
        # GitHub Actions sets CI=true by default, but this must be set explicitly when migrating to Dagger.
        run: make cargo-test
