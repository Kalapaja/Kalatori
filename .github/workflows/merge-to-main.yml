name: Merge to main

on:
  push:
    branches:
      - main

jobs:
  cargo-test:
    uses: ./.github/workflows/_job-cargo-test-coverage.yml
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  integration-test:
    uses: ./.github/workflows/_job-integration-test.yml

  docker-build:
    needs: [cargo-test, integration-test]
    uses: ./.github/workflows/_job-docker-build.yml
    with:
      image_tags: >-
        ghcr.io/${{ github.repository_owner }}/kalatori-dev:${{ github.sha }},
        ghcr.io/${{ github.repository_owner }}/kalatori-dev:latest
      push: true
    permissions:
      contents: read
      packages: write

  restart-stage:
    name: Restart stage billing via ArgoCD
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
      - name: Restart deployment
        env:
          ARGOCD_SERVER: https://argocd.internal.kalatori.org
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_DEPLOYMENT_TOKEN }}
        run: |
          curl -sSf --connect-timeout 10 --max-time 30 -X POST \
            "$ARGOCD_SERVER/api/v1/applications/stage-billing/resource/actions/v2" \
            -H "Authorization: Bearer $ARGOCD_AUTH_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "action": "restart",
              "resourceName": "billing",
              "namespace": "billing",
              "kind": "Deployment",
              "version": "v1",
              "group": "apps"
            }'
          echo "Restarted billing"
