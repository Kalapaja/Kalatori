name: PR to main

on:
  pull_request:
    branches:
      - main

env:
  DOCKER_HOST: ${{ vars.DAGGER_CI_HOST }}
  _EXPERIMENTAL_DAGGER_RUNNER_HOST: docker-container://dagger-engine-v0.20.1

jobs:
  semantic-pr:
    uses: ./.github/workflows/_job-semantic-pr.yml
    secrets: inherit

  fmt:
    uses: ./.github/workflows/_job-fmt.yml

  clippy:
    uses: ./.github/workflows/_job-clippy.yml

  cargo-deny:
    uses: ./.github/workflows/_job-cargo-deny.yml

  cargo-test:
    uses: ./.github/workflows/_job-cargo-test-coverage.yml
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  integration-test:
    uses: ./.github/workflows/_job-integration-test.yml

  release-validate:
    uses: ./.github/workflows/_job-release-validate.yml

  # --- Dagger checks (Phase 1 migration, run alongside existing checks) ---
  dagger-checks:
    name: Dagger / ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: Format,  command: check-fmt }
          - { name: Deny,    command: check-deny }
          - { name: Machete, command: check-machete }
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-dagger
        with:
          ssh-private-key: ${{ secrets.DAGGER_CI_SSH_KEY }}
          known-host: ${{ vars.DAGGER_CI_KNOWN_HOST }}
      - run: cd ci && dagger call ${{ matrix.command }}
